server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      routes:

        # Product Service
        - id: product-service
          uri: http://localhost:8081
          predicates:
            - Path=/products/**

        # Customer Service
        - id: customer-service
          uri: http://localhost:8082
          predicates:
            - Path=/customers/**

        # Order Service
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders/**

        # Payment Service
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/payments/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
```

